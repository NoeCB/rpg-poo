<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBD RPG - La Prueba de la Entidad</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay" class="overlay">
        <div class="modal">
            <h1 class="creepy-title">EL ENTE DESPIERTA</h1>
            <p>La prueba está a punto de comenzar. Selecciona para iniciar la cacería.</p>
            <button id="btn-start" class="btn-primary">INICIAR SIMULACIÓN</button>
        </div>
    </div>

    <header>
        <h1 class="creepy-title">DEAD BY DAYLIGHT: RPG</h1>
    </header>

    <main class="game-container hidden" id="game-container">
        
        <!-- Área de Supervivientes -->
        <section class="team-panel survi-panel">
            <h2>SUPERVIVIENTES</h2>
            <div id="survi-list" class="character-list">
                <!-- Se inyectan por JS -->
            </div>
        </section>

        <!-- Centro: Controles y Log -->
        <section class="center-panel">
            <div class="combat-log" id="combat-log">
                <p class="system-msg">Esperando a que empiece la partida...</p>
            </div>
            
            <div class="controls" id="controls">
                <h3>ACCIONES</h3>
                <div class="action-grid">
                    <button class="btn-action btn-attack" onclick="setMode('ATACAR')">⚔️ ATACAR</button>
                    <button class="btn-action btn-defend" onclick="ejecutarDefensa()">🛡️ DEFENDER</button>
                    <button class="btn-action btn-perk" onclick="setMode('PERK')">✨ USAR PERK</button>
                </div>
                
                <div id="target-selection" class="target-selection hidden">
                    <p id="target-prompt">Selecciona tu objetivo:</p>
                    <div id="target-list" class="target-buttons"></div>
                    <button class="btn-cancel" onclick="cancelMode()">Cancelar</button>
                </div>
                
                <div id="perk-selection" class="perk-selection hidden">
                    <p>Selecciona la Perk a utilizar:</p>
                    <div id="perk-list" class="perk-buttons"></div>
                    <button class="btn-cancel" onclick="cancelMode()">Cancelar</button>
                </div>
            </div>
        </section>

        <!-- Área de Killers -->
        <section class="team-panel killer-panel">
            <h2>KILLERS</h2>
            <div id="killer-list" class="character-list">
                <!-- Se inyectan por JS -->
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
