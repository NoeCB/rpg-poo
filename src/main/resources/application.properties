# Configuración del servidor embebido
server.port=8080

# =========================================================
# CONFIGURACIÓN DE BASE DE DATOS (AWS Learner Labs)
# =========================================================
# URL de la base de datos MariaDB/MySQL
# En AWS usarás la IP interna o el DNS público de tu EC2.
# Por ahora (Local): localhost
spring.datasource.url=jdbc:mariadb://localhost:3306/dbd_rpg?useSSL=false&serverTimezone=UTC

# Credenciales
# AWS Learner Labs suele usar labsuser o ubuntu, configuraremos "root" o tu usuario local por defecto.
spring.datasource.username=root
spring.datasource.password=

# Driver
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de Hibernate/JPA (para fases posteriores si usamos Entidades)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
